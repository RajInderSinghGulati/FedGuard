# PostgreSQL — local default, overridden by Docker env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fedguard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fedguard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fedguard2026}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

python.api.url=http://127.0.0.1:5000
server.port=8080